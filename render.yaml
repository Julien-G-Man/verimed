services:
  - type: web
    name: verimed-api
    env: python
    region: oregon
    plan: standard
    

    buildCommand: |
      pip install -q -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NVIDIA_OPENAI_API_KEY
        sync: false
      - key: NVIDIA_OPENAI_API_URL
        value: https://integrate.api.nvidia.com/v1/chat/completions
      - key: NVIDIA_OPENAI_MODEL
        value: openai/gpt-oss-20b
      - key: DATA_DIR
        value: data
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-domain.vercel.app,https://verimed-api.onrender.com
